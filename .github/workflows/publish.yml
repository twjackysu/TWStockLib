name: Publish to NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish (e.g. 1.1.0)'
        required: true
  push:
    tags:
      - 'v*'   # жҺЁ v1.1.0гҖҒv2.0.0 йҖҷйЎһ tag жүҚи§ёзҷј

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      # tag и§ёзҷјжҷӮеҫһ tag ж“·еҸ–зүҲжң¬иҷҹпјҲv1.1.0 вҶ’ 1.1.0пјүпјӣжүӢеӢ•и§ёзҷјжҷӮдҪҝз”Ёијёе…ҘеҖј
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

      - name: Pack
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          dotnet pack TWStockLib/TWStockLib.csproj \
            --no-build --configuration Release \
            -p:PackageVersion=$VERSION --output ./nupkg

      - name: Push to NuGet
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
